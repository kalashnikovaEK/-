# cloudtype.yml
# Cloudtype 배포 설정 파일
# 참고: https://docs.cloudtype.io

app:
  name: discord-vc-bot
  type: container          # Dockerfile 기반 배포

build:
  dockerfile: Dockerfile

deploy:
  replicas: 1              # 1개 인스턴스 (단일 봇)
  port: 8080               # Keep-Alive 웹서버 포트

resources:
  cpu: "0.5"               # 0.5 vCPU (무음 스트림은 경량)
  memory: "512Mi"

# 환경변수는 Cloudtype 대시보드 → 환경변수 탭에서 직접 입력
# DISCORD_TOKEN / GUILD_ID / AUTO_JOIN_CHANNEL_ID / VOICE_STATE_FILE

# (선택) 컨테이너 재배포/교체 후에도 "마지막 접속 채널"을 유지하고 싶다면
# Cloudtype 영구 디스크(Volume)를 추가하고, 그 마운트 경로를
# VOICE_STATE_FILE 환경변수로 지정하세요. (예: /data/voice_state.json)
# 영구 디스크를 쓰지 않을 경우, AUTO_JOIN_CHANNEL_ID 가 컨테이너 교체 시의
# 1차 자동 입장 복구 수단이 됩니다.
# volumes:
#   - name: bot-data
#     mountPath: /data

healthCheck:
  path: /health
  interval: 30
  timeout: 10
